profile:
  name: "Kevin Arturo Gutiérrez Bañuelos"
  target_roles:
    - EDI Analyst
    - Senior EDI Analyst
    - EDI Specialist
    - EDI Support Engineer
    - Integration Support Engineer
    - B2B Integration Engineer
    - Application Support Engineer
    - Middleware Engineer
    - SAP PO Support
    - SAP Integration Engineer
    - Technical Integration Engineer
  target_locations:
    - Remote
    - Mexico
    - United States
    - Canada
    - LATAM
    - Guadalajara
    - Monterrey
    - Querétaro
    - CDMX
  target_salary:
    mexico_mxn_month_min: 50000
