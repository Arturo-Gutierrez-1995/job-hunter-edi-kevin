filters:
  notify_match_min: 80
  store_match_min: 55
  max_jobs_per_source: 80
  gmail_lookback_days: 7
  include_keywords:
    - edi
    - x12
    - edifact
    - as2
    - sftp
    - ftp
    - mdn
    - trading partner
    - b2b
    - integration
    - integrations
    - middleware
    - ibm sterling
    - sterling integrator
    - axway
    - b2bi
    - stedi
    - opentext
    - seeburger
    - sap
    - idoc
    - sap po
    - sap pi
    - sap cpi
    - sap integration suite
    - servicenow
    - application support
    - production support
    - incident management
    - api
    - postman
    - json
    - xml
    - oauth
    - bigquery
  exclude_keywords:
    - nurse
    - physician
    - driver
    - warehouse associate
    - restaurant
    - cashier
    - marketing intern
    - sales representative
    - real estate
    - insurance agent

sources:
  remoteok: true
  arbeitnow: true
  lever: true
  greenhouse: true
  gmail_alerts: true

# Direct public ATS boards
lever_companies:
  - stedi
  - stripe
  - samsara

greenhouse_companies:
  - opentext
  - lattice
  - mulesoft

# Gmail job-alert sources. Create email alerts in these platforms and label them JobHunter in Gmail.
gmail_alert_sources:
  LinkedIn:
    domains:
      - linkedin.com
    link_patterns:
      - linkedin.com/jobs/view
      - linkedin.com/comm/jobs/view
  Indeed:
    domains:
      - indeed.com
      - indeed.com.mx
    link_patterns:
      - indeed.com/viewjob
      - indeed.com/rc/clk
      - indeed.com/jobs
  OCC:
    domains:
      - occ.com.mx
    link_patterns:
      - occ.com.mx/empleo/oferta
      - occ.com.mx/empleos
  Computrabajo:
    domains:
      - computrabajo.com.mx
      - computrabajo.com
    link_patterns:
      - computrabajo.com.mx/ofertas-de-trabajo
      - computrabajo.com/ofertas-de-trabajo
  Glassdoor:
    domains:
      - glassdoor.com
      - glassdoor.com.mx
    link_patterns:
      - glassdoor.com/job-listing
      - glassdoor.com.mx/job-listing
      - glassdoor.com/partner/jobListing
      - glassdoor.com.mx/partner/jobListing
