# Las seis fuentes principales llegan mediante alertas de empleo por Gmail.
# Lever y Greenhouse complementan la búsqueda con vacantes públicas de empresas objetivo.
sources:
  remoteok: false
  arbeitnow: false
  lever: true
  greenhouse: true
  gmail_alerts: true
  icloud_alerts: true

lever_companies:
  - stedi
  - samsara
  - stripe
  - rippling
  - datadog
  - zapier
  - plaid

greenhouse_companies:
  - opentext
  - mulesoft
  - elastic
  - gitlab
  - hashicorp
  - cloudflare
  - okta
  - twilio

# Crea alertas en cada plataforma y haz que Gmail les asigne la etiqueta JobHunter.
gmail_alert_sources:
  OCC:
    domains:
      - occ.com.mx
      - occmundial.com
    link_patterns:
      - occ.com.mx/empleo/oferta
      - occ.com.mx/empleos
      - occ.com.mx/trabajo
      - occmundial.com

  Dice:
    domains:
      - dice.com
      - email.dice.com
    link_patterns:
      - dice.com/job-detail
      - dice.com/jobs/detail
      - dice.com/job-search

  Glassdoor:
    domains:
      - glassdoor.com
      - glassdoor.com.mx
      - glassdooremail.com
    link_patterns:
      - glassdoor.com/job-listing
      - glassdoor.com.mx/job-listing
      - glassdoor.com/partner/jobListing
      - glassdoor.com.mx/partner/jobListing
      - glassdoor.com/Job
      - glassdoor.com.mx/Job

  Computrabajo:
    domains:
      - computrabajo.com.mx
      - computrabajo.com
    link_patterns:
      - computrabajo.com.mx/ofertas-de-trabajo
      - computrabajo.com/ofertas-de-trabajo
      - computrabajo.com.mx/trabajo-de
      - computrabajo.com/trabajo-de

  Indeed:
    domains:
      - indeed.com
      - indeed.com.mx
      - indeedemail.com
    link_patterns:
      - indeed.com/viewjob
      - indeed.com/rc/clk
      - indeed.com/jobs
      - indeed.com.mx/viewjob
      - indeed.com.mx/rc/clk
      - indeed.com.mx/jobs

  LinkedIn:
    domains:
      - linkedin.com
      - linkedinmail.com
    link_patterns:
      - linkedin.com/jobs/view
      - linkedin.com/comm/jobs/view
      - linkedin.com/jobs
      - linkedin.com/jobs/collections
